<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos | TechStore</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Css específico del módulo -->
    <link href="css/catalogo.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar simple para darle un marco al e-commerce -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🛒 ecommerce-tecnologia</a>
        </div>
    </nav>

    <main class="container pb-5">
        <!-- Encabezado y Ordenamiento -->
        <div class="row align-items-center mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
                <h1 class="h2 mb-0 text-dark fw-bold">Catálogo de Productos</h1>
            </div>
            <div class="col-md-6 d-flex justify-content-md-end align-items-center">
                <label for="orden-precio" class="me-2 mb-0 fw-semibold text-secondary">Ordenar por:</label>
                <select id="orden-precio" class="form-select form-select-sm w-auto shadow-sm">
                    <option value="relevancia">Relevancia</option>
                    <option value="asc">Precio: Menor a Mayor</option>
                    <option value="desc">Precio: Mayor a Menor</option>
                </select>
            </div>
        </div>

        <!-- Filtros de categoría -->
        <div class="row mb-4">
            <div class="col-12">
                <!-- Usamos data-attributes para cuando le metas funcionalidad en Fase 2 -->
                <div class="d-flex flex-wrap gap-2" id="filtros-categoria">
                    <button class="btn btn-primary filtro-btn activo" data-categoria="todos">Todos</button>
                    <button class="btn btn-outline-primary filtro-btn" data-categoria="Laptops">Laptops</button>
                    <button class="btn btn-outline-primary filtro-btn" data-categoria="PCs de escritorio">PCs de escritorio</button>
                    <button class="btn btn-outline-primary filtro-btn" data-categoria="Monitores">Monitores</button>
                    <button class="btn btn-outline-primary filtro-btn" data-categoria="Accesorios">Accesorios</button>
                </div>
            </div>
        </div>

        <!-- Contenedor Principal (Acá va a actuar CSS Grid más tarde) -->
        <div id="contenedor-productos">
            <!-- JS inyectará las tarjetas acá -->
        </div>

    </main>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Scripts Propios (En orden de dependencia: data primero, lógica después) -->
    <script src="data/productos.js"></script>
    <script src="js/catalogo.js"></script>
</body>
</html>
